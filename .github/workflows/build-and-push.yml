name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},priority=900
            type=semver,pattern={{major}}.{{minor}},priority=800
            type=semver,pattern={{major}},priority=700
            type=ref,event=branch,priority=600
            type=sha,format=short,prefix=sha-,priority=500
            type=raw,value=latest,enable={{is_default_branch}},priority=100

      - name: Generate build metadata file
        run: |
          COMMIT_SHORT="${GITHUB_SHA::7}"
          cat > build-info.json <<EOF
          {
            "deployed_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
            "commit_sha": "${{ github.sha }}",
            "commit_short": "${COMMIT_SHORT}",
            "image_repo": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
            "image_tag": "${{ steps.meta.outputs.version }}",
            "image_ref": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}",
            "source_ref": "${{ github.ref_name }}",
            "source": "github-actions"
          }
          EOF

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
